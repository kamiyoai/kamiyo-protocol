services:
  - type: worker
    name: kamiyo-agent-exec
    runtime: node
    rootDir: services/kamiyo-agent
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production

      - key: SOLANA_RPC_URL
        value: https://api.mainnet-beta.solana.com
      - key: SOLANA_RPC_FALLBACK_URLS
        value: ""

      - key: KAMIYO_OPERATOR_KEYPAIR_PATH
        sync: false
      - key: KAMIYO_OPERATOR_PRIVATE_KEY
        sync: false

      - key: KAMIYO_MODE
        value: execute
      - key: KAMIYO_EXECUTION_STAGE
        value: canary_1
      - key: KAMIYO_EXECUTION_HARD_STOP
        value: "false"
      - key: KAMIYO_RUN_ONCE
        value: "false"
      - key: KAMIYO_LOOP_INTERVAL_SECONDS
        value: "180"

      - key: KAMIYO_DB_PATH
        value: output/kamiyo-agent/state.db
      - key: KAMIYO_OUTBOX_DIR
        value: output/kamiyo-agent/outbox

      - key: KAMIYO_SOL_DAILY_CAP
        value: "0.5"
      - key: KAMIYO_SOL_PER_TX_CAP
        value: "0.05"
      - key: KAMIYO_MAX_TX_PER_DAY
        value: "48"

      - key: KAMIYO_SWARM_ENABLED
        value: "true"
      - key: KAMIYO_SWARM_REGISTRY_PATH
        value: output/kamiyo-operator/swarm.registry.json
      - key: KAMIYO_SWARM_MISSIONS_PER_TICK
        value: "3"
      - key: KAMIYO_SWARM_MAX_ACTIVE_AGENTS
        value: "5"

      - key: KAMIYO_SWARM_JOB_INTAKE_ENABLED
        value: "true"
      - key: KAMIYO_SWARM_JOB_FEED_PATH
        value: output/kamiyo-operator/swarm.jobs.json
      - key: KAMIYO_SWARM_JOB_FEED_URLS
        value: ""

      - key: KAMIYO_SWARM_RELEVANCE_FEED_URL
        sync: false
      - key: KAMIYO_SWARM_RELEVANCE_API_KEY
        sync: false
      - key: KAMIYO_SWARM_RELEVANCE_AUTH_HEADER
        value: authorization

      - key: KAMIYO_SWARM_AGENTAI_FEED_URL
        sync: false
      - key: KAMIYO_SWARM_AGENTAI_API_KEY
        sync: false
      - key: KAMIYO_SWARM_AGENTAI_AUTH_HEADER
        value: authorization

      - key: KAMIYO_SWARM_KORE_FEED_URL
        sync: false
      - key: KAMIYO_SWARM_KORE_API_KEY
        sync: false
      - key: KAMIYO_SWARM_KORE_AUTH_HEADER
        value: authorization

      - key: KAMIYO_SWARM_JOB_MAX_OPEN
        value: "12"
      - key: KAMIYO_SWARM_JOB_MIN_REWARD_USD
        value: "5"
      - key: KAMIYO_SWARM_SOL_PRICE_USD
        value: "150"
      - key: KAMIYO_SWARM_JOB_FETCH_TIMEOUT_MS
        value: "8000"

      - key: KAMIYO_SWARM_JOB_EXECUTION_ENABLED
        value: "true"
      - key: KAMIYO_SWARM_JOB_EXECUTIONS_PER_TICK
        value: "1"
      - key: KAMIYO_SWARM_JOB_HTTP_TIMEOUT_MS
        value: "20000"
      - key: KAMIYO_SWARM_JOB_MIN_MARGIN_SOL
        value: "0.0005"
      - key: KAMIYO_SWARM_JOB_ESTIMATED_FEE_SOL
        value: "0.00001"
      - key: KAMIYO_SWARM_JOB_REQUIRE_EXPECTED_REWARD
        value: "true"
      - key: KAMIYO_SWARM_INTAKE_ENABLED
        value: "true"
      - key: KAMIYO_SWARM_INTAKE_MAX_OPEN
        value: "16"
      - key: KAMIYO_SWARM_INTAKE_RETRY_LIMIT
        value: "4"
      - key: KAMIYO_SWARM_INTAKE_RETRY_BASE_SECONDS
        value: "120"
      - key: KAMIYO_SWARM_INTAKE_RETRY_MAX_SECONDS
        value: "3600"
      - key: KAMIYO_SWARM_LEAD_CONVERSION_ENABLED
        value: "true"
      - key: KAMIYO_SWARM_LEAD_CONVERSION_MAX_PER_TICK
        value: "6"
      - key: KAMIYO_SWARM_LEAD_CONVERSION_DEFAULT_PAYOUT_USD
        value: "12"
      - key: KAMIYO_SWARM_LEAD_CONVERSION_REQUIRE_ENDPOINT
        value: "true"
      - key: KAMIYO_SWARM_LEAD_CONVERSION_SIMULATE_ONLY
        value: "false"
