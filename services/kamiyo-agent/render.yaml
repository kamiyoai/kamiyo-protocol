      - key: KAMIYO_AGENTIC_LOOP_BUDGET_SOL
        value: "0.005"
      - key: KAMIYO_AGENTIC_LOOP_TIMEOUT_MS
        value: "30000"
      - key: KAMIYO_AGENTIC_LOOP_API_KEY
