      - key: KAMIYO_SWARM_ROLLBACK_NET_SOL_TRIGGER
        value: "-0.02"
      - key: KAMIYO_SWARM_ROLLBACK_RECOVERY_NET_SOL
        value: "0"
      - key: KAMIYO_SWARM_ROLLBACK_MIN_JOBS
        value: "5"
      - key: KAMIYO_SWARM_ROLLBACK_SOURCE_MIN_JOBS
        value: "2"
      - key: KAMIYO_SWARM_ROLLBACK_MAX_DISABLED_SOURCES
        value: "2"
      - key: KAMIYO_SWARM_ROLLBACK_COOLDOWN_HOURS
        value: "24"
      - key: KAMIYO_REVENUE_POLICY_ENABLED
