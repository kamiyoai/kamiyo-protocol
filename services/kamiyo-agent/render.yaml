      - key: KAMIYO_EVENTS_SSE_ENABLED
        value: "false"
      - key: KAMIYO_AGENT_MEMORY_ENABLED
        value: "false"
      - key: KAMIYO_AGENT_MEMORY_MAX_PER_TYPE
        value: "20"
      - key: KAMIYO_AGENT_MEMORY_INJECTION_LIMIT
        value: "5"
      - key: KAMIYO_MANDATE_CLASSIFICATION_ENABLED
