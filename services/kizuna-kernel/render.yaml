services:
  - type: web
    name: kamiyo-kizuna-kernel
    runtime: node
    buildCommand: pnpm install --ignore-scripts && pnpm --dir services/kizuna-kernel build
    startCommand: pnpm --dir services/kizuna-kernel start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3610"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: KIZUNA_KERNEL_INTERNAL_TOKEN
        sync: false
      - key: KIZUNA_KERNEL_OPERATOR_TOKEN
        sync: false
      - key: KIZUNA_KERNEL_SIGNING_BACKEND
        value: aws-kms
      - key: KIZUNA_KERNEL_ACTIVE_SIGNING_KID
        sync: false
      - key: KIZUNA_KERNEL_LOCAL_PRIVATE_KEYS
        sync: false
      - key: KIZUNA_KERNEL_AWS_REGION
        sync: false
      - key: KIZUNA_KERNEL_AWS_KMS_KEY_IDS
        sync: false
      - key: KIZUNA_KERNEL_ACTIVE_POLICY_PACKS
        sync: false
      - key: KIZUNA_KERNEL_ENVELOPE_TTL_MS
        value: "120000"
    healthCheckPath: /health
    autoDeploy: true
