services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trust_layer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trust_layer"]
      interval: 2s
      timeout: 2s
      retries: 30

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.13
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --overprovisioned
      - --check=false
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 45
