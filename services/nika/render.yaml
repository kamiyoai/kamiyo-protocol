services:
  - type: worker
    name: kamiyo-nika
    runtime: node
    rootDir: services/nika
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      # Anthropic
      - key: ANTHROPIC_API_KEY
        sync: false

      # Twitter OAuth 1.0a
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false

      # DKG (OriginTrail)
      - key: DKG_ENDPOINT
        value: https://positron.origin-trail.network
      - key: DKG_PORT
        value: "80"
      - key: DKG_BLOCKCHAIN
        value: otp::mainnet
      - key: DKG_PRIVATE_KEY
        sync: false
      - key: NIKA_PARANET_UAL
        sync: false

      # Scheduling
      - key: POST_INTERVAL_MIN_MS
        value: "10800000"  # 3 hours
      - key: POST_INTERVAL_MAX_MS
        value: "18000000"  # 5 hours

      # Infrastructure
      - key: PORT
        value: "4020"
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info

      # Shared state (for cross-instance mention dedup)
      - key: SHARED_STATE_REDIS_URL
        sync: false
      - key: SHARED_STATE_PREFIX
        value: nika:mentions

      # Alerting (optional)
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: ALERT_WEBHOOK_TYPE
        value: slack

      # Autonomous execution (Meishi + OpenClaw)
      - key: AUTONOMY_ENABLED
        value: "false"
      - key: AUTONOMY_DRY_RUN
        value: "true"
      - key: AUTONOMY_API_TOKEN
        sync: false
      - key: AUTONOMY_COMMAND_PREFIX
        value: /autonomy
      - key: AUTONOMY_TICK_INTERVAL_MS
        value: "15000"
      - key: AUTONOMY_MAX_QUEUE_SIZE
        value: "100"
      - key: AUTONOMY_MAX_TASK_HISTORY
        value: "500"
      - key: AUTONOMY_OBJECTIVE_MAX_LENGTH
        value: "1200"

      - key: AUTONOMY_MEISHI_VERIFY_URL
        value: https://api.kamiyo.ai/api/meishi/agent/{agentIdentity}/verify
      - key: AUTONOMY_MEISHI_AGENT_ID
        sync: false
      - key: AUTONOMY_MEISHI_MIN_SCORE
        value: "1"
      - key: AUTONOMY_MEISHI_REQUIRE_COMPLIANT
        value: "true"

      # X-triggered autonomy (live mode should be private by default)
      - key: AUTONOMY_X_COMMANDS_ENABLED
        value: "true"
      - key: AUTONOMY_X_PUBLIC
        value: "false"
      - key: AUTONOMY_X_ALLOWLIST
        value: ""

      - key: AUTONOMY_OPENCLAW_BASE_URL
        sync: false
      - key: AUTONOMY_OPENCLAW_MODE
        value: tools_invoke

      # hooks mode (legacy async dispatch)
      - key: AUTONOMY_OPENCLAW_HOOK_PATH
        value: /hooks
      - key: AUTONOMY_OPENCLAW_HOOK_TOKEN
        sync: false

      # tools_invoke mode (sync reply via sessions_send)
      - key: AUTONOMY_OPENCLAW_GATEWAY_TOKEN
        sync: false
      - key: AUTONOMY_OPENCLAW_CALLER_SESSION_KEY
        value: main
      - key: AUTONOMY_OPENCLAW_TARGET_SESSION_PREFIX
        value: hook:nika
      - key: AUTONOMY_OPENCLAW_RUN_TIMEOUT_SECONDS
        value: "60"
      - key: AUTONOMY_OPENCLAW_TIMEOUT_MS
        value: "60000"
