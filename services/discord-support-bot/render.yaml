services:
  - type: worker
    name: kamiyo-support-bot
    runtime: node
    rootDir: services/discord-support-bot
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPPORT_CHANNEL_ID
        sync: false
