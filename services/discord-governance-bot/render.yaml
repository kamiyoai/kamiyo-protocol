services:
  - type: worker
    name: kamiyo-discord-bot
    runtime: node
    rootDir: services/discord-governance-bot
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: GUILD_ID
        sync: false
      - key: GOVERNANCE_CHANNEL_ID
        sync: false
      - key: SUPPORT_CHANNEL_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
