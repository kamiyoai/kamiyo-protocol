# Litestream configuration for SQLite replication
# Environment variables:
#   LITESTREAM_REPLICA_URL - S3-compatible URL (s3://bucket/path)
#   AWS_ACCESS_KEY_ID - S3 access key
#   AWS_SECRET_ACCESS_KEY - S3 secret key
#   AWS_REGION - S3 region (default: us-east-1)

dbs:
  - path: /app/data/companion.db
    replicas:
      - type: s3
        bucket: ${LITESTREAM_BUCKET}
        path: companion
        region: ${AWS_REGION:-us-east-1}
        endpoint: ${LITESTREAM_ENDPOINT}
        access-key-id: ${AWS_ACCESS_KEY_ID}
        secret-access-key: ${AWS_SECRET_ACCESS_KEY}
        retention: 168h        # Keep 7 days of history
        retention-check-interval: 1h
        snapshot-interval: 1h  # Full snapshot every hour
        sync-interval: 1s      # Sync WAL every second
