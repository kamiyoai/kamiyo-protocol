services:
  - type: web
    name: kamiyo-x402
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3402
      - key: MERCHANT_ADDRESS
        sync: false
      - key: DEFAULT_NETWORK
        value: base
      - key: PRICE_AGENT_QUERY
        value: "0.001"
      - key: PRICE_REPUTATION_CHECK
        value: "0.0005"
      - key: PRICE_SIGNAL
        value: "0.01"
      - key: ENABLE_REPUTATION_PRICING
        value: "true"
      - key: SETTLEMENT_ENABLED
        value: "true"
      - key: DKG_ENDPOINT
        value: "https://dkg.kamiyo.ai"
      - key: PAYAI_FACILITATOR_URL
        value: "https://facilitator.payai.network"
      - key: KIZUNA_UPSTREAM_URL
        sync: false
      - key: KIZUNA_PROXY_TIMEOUT_MS
        value: "10000"
    healthCheckPath: /health
    autoDeploy: true
