name: KAMIYO Singularity Gate

on:
  push:
    branches: [main]
    paths:
      - "apps/kamiyo-singularity/**"
      - "programs/kamiyo-singularity-market/**"
      - "programs/kamiyo-singularity-orderbook/**"
      - "ops/kamiyo-singularity/**"
      - ".github/workflows/kamiyo-singularity-gate.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/kamiyo-singularity/**"
      - "programs/kamiyo-singularity-market/**"
      - "programs/kamiyo-singularity-orderbook/**"
      - "ops/kamiyo-singularity/**"
      - ".github/workflows/kamiyo-singularity-gate.yml"

jobs:
  release_gate:
    name: Release Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run KAMIYO Singularity release gate
        run: ./ops/kamiyo-singularity/release-gate.sh
