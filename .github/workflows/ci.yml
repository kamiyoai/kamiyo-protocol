name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: 2.3.13
  ANCHOR_VERSION: 0.31.1
  TRIDENT_VERSION: 0.11.1

jobs:
  repo_sanity:
    name: Repo Sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Block tracked private docs/partnerships
        run: |
          if [ -n "$(git ls-files -- docs/partnerships)" ]; then
            echo "::error::docs/partnerships is private and must remain untracked"
            git ls-files -- docs/partnerships
            exit 1
          fi

  solana:
    name: Solana
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)" -- v${{ env.SOLANA_VERSION }}
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - run: pnpm install
      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase
      - name: Build with Anchor
        run: anchor build
      - name: Sync program IDs
        run: anchor keys sync --provider.cluster localnet
      - name: Sync localnet program IDs
        run: node scripts/sync-anchor-localnet-program-ids.cjs
      - name: Rebuild with synced program IDs
        run: anchor build
      - name: Install protoc (required by Trident)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install Trident
        run: cargo install trident-cli --version ${{ env.TRIDENT_VERSION }} --locked
      - name: Trident fuzz (smoke)
        working-directory: trident-tests
        env:
          TRIDENT_ITERATIONS: 25
          TRIDENT_FLOW_CALLS: 25
        run: trident fuzz run fuzz_kamiyo --with-exit-code
      - run: anchor test --skip-build
      - name: Validate VK
        run: ./scripts/validate-vk.sh
      - name: Security Audit Policy
        run: pnpm run audit:policy

  evm:
    name: EVM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: ZK Reputation
        working-directory: contracts/zk-reputation
        run: forge build && forge test -vvv

      - name: ZK Reputation PoCH Bridge
        working-directory: contracts/zk-reputation
        run: forge test -vvv --match-path test/PoCHValidationBridge.t.sol

      - name: Monad
        working-directory: contracts/monad
        run: forge build && forge test -vvv

      - name: Hyperliquid
        working-directory: contracts/hyperliquid
        run: forge build && forge test -vvv

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install

      - name: PoCH API Gate
        run: pnpm --filter kamiyo-companion test -- src/__tests__/poch-routes.test.ts

      - name: PoCH API Build
        run: pnpm --filter kamiyo-companion build

      - name: PoCH SDK Build
        run: pnpm --filter @kamiyo-org/sdk build

      - name: OpenClaw 3.1 Compatibility Gate
        run: |
          node -e "const p=require('./packages/kamiyo-openclaw/package.json'); if (p.peerDependencies?.openclaw !== '>=3.1.0') { throw new Error('packages/kamiyo-openclaw peerDependencies.openclaw must be >=3.1.0'); }"
          pnpm --filter @kamiyo-org/openclaw build
          pnpm --filter @kamiyo-org/openclaw test

      - name: PoCH Agent Paranet Test
        run: pnpm --filter @kamiyo-org/agent-paranet test

      - name: Docs Command Drift Check
        run: pnpm run check:docs

      - name: Service Onboarding Check
        run: pnpm run check:onboarding

      - name: MCP Tool Parity Gate
        run: pnpm run check:mcp:parity

      - name: Workspace Build
        run: pnpm -r --if-present --no-bail run build

      - name: Workspace Test
        run: pnpm -r --if-present --no-bail run test

      - name: Install Rust lint dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Rust Core Lint
        run: pnpm run lint:rust

      - name: Test Meishi Header Validation
        run: npx tsx node_modules/mocha/bin/mocha.js -t 120000 tests/meishi-validation.test.ts

      - name: Test Meishi DKG Alignment
        run: npx tsx node_modules/mocha/bin/mocha.js -t 120000 tests/meishi-dkg-alignment.test.ts

      - name: Test Meishi DKG Integrity
        run: npx tsx node_modules/mocha/bin/mocha.js -t 120000 tests/meishi-dkg-integrity.test.ts

      - name: PNPM Audit (Critical)
        run: pnpm audit --prod --audit-level=critical

  kizuna_db_integration:
    name: Kizuna DB Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kizuna_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kizuna_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install

      - name: Run Kizuna DB integration invariants
        env:
          KIZUNA_INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kizuna_ci
        run: pnpm --filter @kamiyo-org/x402-facilitator test -- tests/kizuna-db.integration.test.ts

  fairscale_db_integration:
    name: FairScale DB Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fairscale_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fairscale_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install

      - name: Run FairScale DB integration invariants
        env:
          FAIRSCALE_FUSION_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fairscale_ci
        run: pnpm --filter kamiyo-companion test -- src/__tests__/fairscale-fusion-store.integration.test.ts

  openclaw_runtime_smoke:
    name: OpenClaw Runtime Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install

      - name: Build OpenClaw plugin package
        run: pnpm --filter @kamiyo-org/openclaw build

      - name: Install OpenClaw CLI
        run: npm install -g openclaw@2026.3.1

      - name: Run OpenClaw runtime smoke
        run: bash scripts/ci/openclaw-runtime-smoke.sh

  noir:
    name: Noir
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Noirup
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH

      - name: Pin Noir Toolchain
        run: |
          noirup -v 1.0.0-beta.19
          nargo --version

      - name: Check all Noir circuits
        run: |
          for circuit in noir/circuits/*; do
            if [ -f "$circuit/Nargo.toml" ]; then
              echo "Checking $circuit"
              (cd "$circuit" && nargo check)
            fi
          done

      - name: Test PoCH uniqueness circuit
        run: |
          cd noir/circuits/poch-uniqueness
          nargo test

  poch_release_gate:
    name: PoCH Release Gate
    runs-on: ubuntu-latest
    needs:
      - noir
      - evm
      - typescript
      - openclaw_runtime_smoke
    steps:
      - name: Enforce PoCH critical domains
        run: |
          echo "PoCH release gate passed: noir + evm + api/sdk/paranet + openclaw runtime smoke"
