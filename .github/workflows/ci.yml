name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9

jobs:
  repo_sanity:
    name: Repo Sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Block tracked private docs/partnerships
        run: |
          if [ -n "$(git ls-files -- docs/partnerships)" ]; then
            echo "::error::docs/partnerships is private and must remain untracked"
            git ls-files -- docs/partnerships
            exit 1
          fi

  changes:
    name: Workspace Changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.detect.outputs.core }}
      modules: ${{ steps.detect.outputs.modules }}
      legacy: ${{ steps.detect.outputs.legacy }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect workspace group changes
        id: detect
        run: |
          node scripts/check-workspace-group-changes.mjs \
            --base "${{ github.event.pull_request.base.sha || github.event.before }}" \
            --head "${{ github.sha }}" \
            --github-output

  core:
    name: Kizuna Core
    needs: [repo_sanity, changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Build core
        run: pnpm run build

      - name: Test core
        run: pnpm run test

      - name: Lint core
        run: pnpm run lint:check

      - name: Docs command drift check
        run: pnpm run check:docs

      - name: Service onboarding check
        run: pnpm run check:onboarding

  kizuna_db_integration:
    name: Kizuna DB Integration
    needs: [repo_sanity, core]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kizuna_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kizuna_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Run Kizuna DB integration invariants
        env:
          KIZUNA_INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kizuna_ci
        run: pnpm --filter @kamiyo/x402-facilitator test -- tests/kizuna-db.integration.test.ts

  modules:
    name: Kizuna Modules
    needs: [repo_sanity, changes, core]
    if: needs.changes.outputs.modules == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Build modules
        run: pnpm run build:modules

      - name: Test modules
        run: pnpm run test:modules
