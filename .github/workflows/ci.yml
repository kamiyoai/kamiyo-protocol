name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: 2.3.13
  ANCHOR_VERSION: 0.31.1
  TRIDENT_VERSION: 0.11.1

jobs:
  repo_sanity:
    name: Repo Sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Block tracked private docs/partnerships
        run: |
          if [ -n "$(git ls-files -- docs/partnerships)" ]; then
            echo "::error::docs/partnerships is private and must remain untracked"
            git ls-files -- docs/partnerships
            exit 1
          fi

  solana:
    name: Solana
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)" -- v${{ env.SOLANA_VERSION }}
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - run: pnpm install
      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase
      - name: Build with Anchor
        run: anchor build
      - name: Sync program IDs
        run: anchor keys sync --provider.cluster localnet
      - name: Sync localnet program IDs
        run: node scripts/sync-anchor-localnet-program-ids.cjs
      - name: Rebuild with synced program IDs
        run: anchor build
      - name: Install protoc (required by Trident)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install Trident
        run: cargo install trident-cli --version ${{ env.TRIDENT_VERSION }} --locked
      - name: Trident fuzz (smoke)
        working-directory: trident-tests
        env:
          TRIDENT_ITERATIONS: 25
          TRIDENT_FLOW_CALLS: 25
        run: trident fuzz run fuzz_kamiyo --with-exit-code
      - run: anchor test --skip-build
      - name: Validate VK
        run: ./scripts/validate-vk.sh
      - name: Cargo Audit
        run: cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093

  evm:
    name: EVM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: ZK Reputation
        working-directory: contracts/zk-reputation
        run: forge build && forge test -vvv

      - name: Monad
        working-directory: contracts/monad
        run: forge build && forge test -vvv

      - name: Hyperliquid
        working-directory: contracts/hyperliquid
        run: forge build && forge test -vvv

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install

      - name: Build SDK
        run: pnpm run build:sdk

      - name: Build Meishi Stack
        run: |
          pnpm --filter @kamiyo/meishi build
          pnpm --filter @kamiyo/meishi-middleware build
          pnpm --filter @kamiyo/meishi-mcp build
          pnpm --filter @kamiyo/x402-client build
          pnpm --filter @kamiyo/meishi-compliance build

      - name: Test SDK
        run: pnpm run test:sdk

      - name: Test Meishi Header Validation
        run: npx ts-mocha -p ./tests/tsconfig.json -t 120000 tests/meishi-validation.test.ts

      - name: Test Meishi DKG Alignment
        run: npx ts-mocha -p ./tests/tsconfig.json -t 120000 tests/meishi-dkg-alignment.test.ts

      - name: PNPM Audit (Critical)
        run: pnpm audit --prod --audit-level=critical
