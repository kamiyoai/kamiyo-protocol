name: autonomous-dev

on:
  schedule:
    - cron: "0 */4 * * *"
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to work on (blank = pick next open agent-labeled)"
        required: false

concurrency:
  group: autonomous-dev
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  halt-check:
    runs-on: ubuntu-latest
    outputs:
      halted: ${{ steps.check.outputs.halted }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "halt-autopilot",
              per_page: 1,
            });
            core.setOutput("halted", data.length > 0 ? "true" : "false");

  autopilot:
    needs: halt-check
    if: >-
      needs.halt-check.outputs.halted == 'false' &&
      (github.event_name != 'issues' || github.event.label.name == 'agent')
    runs-on: self-hosted
    timeout-minutes: 45
    env:
      LLM_BASE_URL: http://localhost:11434/v1
      LLM_API_KEY: ollama
      GITHUB_REPO: ${{ github.repository }}
      CLAUDE_MODEL: hf.co/OBLITERATUS/gemma-4-E4B-it-OBLITERATED:Q5_K_M
      AUTOPILOT_DB_PATH: .autopilot/agent.db
      DAILY_USD_MAX: "0"
      RECONCILE_DELAY_HOURS: "6"
      AGENT_LEARNING_API_URL: ${{ secrets.AGENT_LEARNING_API_URL }}
      AGENT_LEARNING_API_TOKEN: ${{ secrets.AGENT_LEARNING_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTOPILOT_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git identity
        run: |
          git config user.name "kamiyo-bot"
          git config user.email "bot@kamiyo.dev"

      - name: Build selfimprove
        working-directory: packages/kamiyo-selfimprove
        run: pnpm install --ignore-workspace && pnpm build

      - name: Build agent runtime
        working-directory: packages/kamiyo-agent
        run: pnpm install --ignore-workspace && pnpm build

      - name: Install autopilot deps
        working-directory: services/kamiyo-autopilot
        run: pnpm install --ignore-workspace

      - name: Build autopilot
        working-directory: services/kamiyo-autopilot
        run: pnpm build

      - name: Run autopilot (scheduled / labeled issue)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.issue == ''
        working-directory: services/kamiyo-autopilot
        env:
          GITHUB_TOKEN: ${{ secrets.AUTOPILOT_PAT || github.token }}
        run: node dist/index.js

      - name: Run autopilot (manual issue)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.issue != ''
        working-directory: services/kamiyo-autopilot
        env:
          GITHUB_TOKEN: ${{ secrets.AUTOPILOT_PAT || github.token }}
        run: node dist/run-issue.js ${{ github.event.inputs.issue }}

      - name: Reconcile autopilot receipts
        working-directory: services/kamiyo-autopilot
        env:
          GITHUB_TOKEN: ${{ secrets.AUTOPILOT_PAT || github.token }}
        run: node dist/reconcile.js
