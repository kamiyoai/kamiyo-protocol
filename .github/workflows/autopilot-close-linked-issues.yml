name: autopilot-close-linked-issues

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close:
    if: github.event.pull_request.merged == true && github.event.pull_request.user.login == 'kamiyobot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOPILOT_PAT || github.token }}
          script: |
            const pr = context.payload.pull_request;
            const haystack = `${pr.title}\n${pr.body ?? ""}\n${pr.head.ref}`;
            const refs = new Set();
            for (const m of haystack.matchAll(/(?:closes|fixes|resolves)\s+#(\d+)/gi)) {
              refs.add(Number(m[1]));
            }
            const branch = pr.head.ref.match(/issue-(\d+)/i);
            if (branch) refs.add(Number(branch[1]));
            if (refs.size === 0) {
              core.info("no linked issues found");
              return;
            }
            const { owner, repo } = context.repo;
            for (const n of refs) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner, repo, issue_number: n,
                });
                if (issue.state === "closed") continue;
                await github.rest.issues.createComment({
                  owner, repo, issue_number: n,
                  body: `done via #${pr.number}`,
                });
                await github.rest.issues.update({
                  owner, repo, issue_number: n,
                  state: "closed",
                  state_reason: "completed",
                });
                core.info(`closed #${n}`);
              } catch (e) {
                core.warning(`close #${n} failed: ${e.message}`);
              }
            }
