name: Release reality-fork CLI

on:
  push:
    tags:
      - "rf-cli-v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CRATE_DIR: crates/kamiyo-reality-fork-cli

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: reality-fork-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: reality-fork-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            name: reality-fork-x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            name: reality-fork-aarch64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: reality-fork-x86_64-windows.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        working-directory: ${{ env.CRATE_DIR }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "${{ env.CRATE_DIR }}/target/${{ matrix.target }}/release/reality-fork.exe" "${{ matrix.name }}"
          else
            cp "${{ env.CRATE_DIR }}/target/${{ matrix.target }}/release/reality-fork" "${{ matrix.name }}"
            chmod +x "${{ matrix.name }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: reality-fork-*
          generate_release_notes: true
