name: marketing-agent

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log drafts without scheduling (1/true to enable)"
        required: false
        default: "1"

concurrency:
  group: marketing-agent
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  halt-check:
    runs-on: ubuntu-latest
    outputs:
      halted: ${{ steps.check.outputs.halted }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "halt-autopilot",
              per_page: 1,
            });
            core.setOutput("halted", data.length > 0 ? "true" : "false");

  draft-and-schedule:
    needs: halt-check
    if: needs.halt-check.outputs.halted == 'false'
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      LLM_BASE_URL: http://localhost:11434/v1
      LLM_API_KEY: ollama
      GITHUB_REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ github.token }}
      POSTIZ_URL: ${{ secrets.POSTIZ_URL }}
      POSTIZ_API_KEY: ${{ secrets.POSTIZ_API_KEY }}
      POSTIZ_INTEGRATIONS: ${{ secrets.POSTIZ_INTEGRATIONS }}
      CLAUDE_MODEL: hf.co/OBLITERATUS/gemma-4-E4B-it-OBLITERATED:Q5_K_M
      MARKETING_AGENT_DB_PATH: .marketing-agent/agent.db
      DAILY_USD_MAX: "0"
      POSTS_PER_DAY: "2"
      SELF_IMPROVE_ENABLED: "true"
      SELF_IMPROVE_TASK_TYPE: marketing_post_drafting
      SELF_IMPROVE_JUDGE_MODEL: hf.co/OBLITERATUS/gemma-4-E4B-it-OBLITERATED:Q5_K_M
      SELF_IMPROVE_MIN_SAMPLES: "5"
      SELF_IMPROVE_P_THRESHOLD: "0.1"
      DRY_RUN: ${{ github.event.inputs.dry_run || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build selfimprove
        working-directory: packages/kamiyo-selfimprove
        run: pnpm install --ignore-workspace && pnpm build

      - name: Build agent runtime
        working-directory: packages/kamiyo-agent
        run: pnpm install --ignore-workspace && pnpm build

      - name: Install marketing-agent deps
        working-directory: services/kamiyo-marketing-agent
        run: pnpm install --ignore-workspace

      - name: Build marketing-agent
        working-directory: services/kamiyo-marketing-agent
        run: pnpm build

      - name: Run marketing-agent
        working-directory: services/kamiyo-marketing-agent
        run: node dist/index.js
