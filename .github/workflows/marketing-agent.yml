name: marketing-agent

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log drafts without scheduling (1/true to enable)"
        required: false
        default: "1"

concurrency:
  group: marketing-agent
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  halt-check:
    runs-on: ubuntu-latest
    outputs:
      halted: ${{ steps.check.outputs.halted }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "halt-autopilot",
              per_page: 1,
            });
            core.setOutput("halted", data.length > 0 ? "true" : "false");

  draft-and-schedule:
    needs: halt-check
    if: needs.halt-check.outputs.halted == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || secrets.KAMIYO_CANARY_ANTHROPIC_API_KEY }}
      GITHUB_REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ github.token }}
      POSTIZ_URL: ${{ secrets.POSTIZ_URL }}
      POSTIZ_API_KEY: ${{ secrets.POSTIZ_API_KEY }}
      POSTIZ_INTEGRATIONS: ${{ secrets.POSTIZ_INTEGRATIONS }}
      CLAUDE_MODEL: claude-haiku-4-5-20251001
      DAILY_USD_MAX: "3"
      POSTS_PER_DAY: "2"
      DRY_RUN: ${{ github.event.inputs.dry_run || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install marketing-agent deps
        working-directory: services/kamiyo-marketing-agent
        run: pnpm install --ignore-workspace

      - name: Build marketing-agent
        working-directory: services/kamiyo-marketing-agent
        run: pnpm build

      - name: Run marketing-agent
        working-directory: services/kamiyo-marketing-agent
        run: node dist/index.js
