name: docs-agent

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to inspect (blank = HEAD)"
        required: false

concurrency:
  group: docs-agent
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  halt-check:
    runs-on: ubuntu-latest
    outputs:
      halted: ${{ steps.check.outputs.halted }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "halt-autopilot",
              per_page: 1,
            });
            core.setOutput("halted", data.length > 0 ? "true" : "false");

  regenerate:
    needs: halt-check
    if: needs.halt-check.outputs.halted == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || secrets.KAMIYO_CANARY_ANTHROPIC_API_KEY }}
      GITHUB_REPO: ${{ github.repository }}
      CLAUDE_MODEL: claude-haiku-4-5-20251001
      DAILY_USD_MAX: "5"
      MERGE_SHA: ${{ github.event.inputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTOPILOT_PAT || github.token }}

      - name: Skip if last commit was made by docs-agent itself
        id: skip
        run: |
          msg=$(git log -1 --format=%s)
          if [[ "$msg" == docs-agent:* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.skip.outputs.skip == 'false'
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: steps.skip.outputs.skip == 'false'
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Configure git identity
        if: steps.skip.outputs.skip == 'false'
        run: |
          git config user.name "kamiyobot"
          git config user.email "kamiyo-ai@users.noreply.github.com"

      - name: Install docs-agent deps
        if: steps.skip.outputs.skip == 'false'
        working-directory: services/kamiyo-docs-agent
        run: pnpm install --ignore-workspace

      - name: Build docs-agent
        if: steps.skip.outputs.skip == 'false'
        working-directory: services/kamiyo-docs-agent
        run: pnpm build

      - name: Run docs-agent
        if: steps.skip.outputs.skip == 'false'
        working-directory: services/kamiyo-docs-agent
        run: node dist/index.js

      - name: Open PR with regenerated docs
        if: steps.skip.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.AUTOPILOT_PAT || github.token }}
        run: |
          if git diff --quiet -- README.md CHANGELOG.md services/*/CHANGELOG.md services/*/README.md; then
            echo "no doc changes"
            exit 0
          fi
          short="${MERGE_SHA:0:7}"
          branch="docs-agent/regen-${short}"
          git checkout -b "$branch"
          git add README.md CHANGELOG.md services/*/CHANGELOG.md services/*/README.md 2>/dev/null || true
          git commit -m "docs-agent: regenerate for ${short}"
          git push -u origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "docs-agent: regenerate for ${short}" \
            --body "Automated docs refresh for commit ${short}. Review diff, squash-merge." \
            --label agent-approved || true
