name: docs-agent

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to inspect (blank = HEAD)"
        required: false

concurrency:
  group: docs-agent
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  halt-check:
    runs-on: ubuntu-latest
    outputs:
      halted: ${{ steps.check.outputs.halted }}
    steps:
      - id: check
        uses: actions/github-script@v9
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "halt-autopilot",
              per_page: 1,
            });
            core.setOutput("halted", data.length > 0 ? "true" : "false");

  regenerate:
    needs: halt-check
    if: needs.halt-check.outputs.halted == 'false'
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      LLM_BASE_URL: http://localhost:11434/v1
      LLM_API_KEY: ollama
      GITHUB_REPO: ${{ github.repository }}
      CLAUDE_MODEL: hf.co/OBLITERATUS/gemma-4-E4B-it-OBLITERATED:Q5_K_M
      AGENT_STATE_DIR: ${{ github.workspace }}/../.kamiyo-agent-state
      DOCS_AGENT_DB_PATH: ${{ github.workspace }}/../.kamiyo-agent-state/kamiyo-docs-agent/agent.db
      DAILY_USD_MAX: "0"
      SELF_IMPROVE_ENABLED: "true"
      SELF_IMPROVE_TASK_TYPE: docs_regeneration
      SELF_IMPROVE_JUDGE_MODEL: hf.co/OBLITERATUS/gemma-4-E4B-it-OBLITERATED:Q5_K_M
      SELF_IMPROVE_MIN_SAMPLES: "5"
      SELF_IMPROVE_P_THRESHOLD: "0.1"
      RECONCILE_DELAY_HOURS: "4"
      AGENT_LEARNING_API_URL: ${{ secrets.AGENT_LEARNING_API_URL }}
      AGENT_LEARNING_API_TOKEN: ${{ secrets.AGENT_LEARNING_API_TOKEN }}
      AGENT_LEARNING_CONTROL_LOOP_TRIGGER: ${{ github.event_name }}
      MERGE_SHA: ${{ github.event.inputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTOPILOT_PAT || github.token }}

      - name: Skip if last commit was made by docs-agent itself
        id: skip
        run: |
          msg=$(git log -1 --format=%s)
          if [[ "$msg" == docs-agent:* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git identity
        run: |
          git config user.name "kamiyobot"
          git config user.email "kamiyo-ai@users.noreply.github.com"

      - name: Prepare persistent agent state
        run: mkdir -p "$AGENT_STATE_DIR/kamiyo-docs-agent"

      - name: Build selfimprove
        working-directory: packages/kamiyo-selfimprove
        run: pnpm install --ignore-workspace && pnpm build

      - name: Build agent runtime
        working-directory: packages/kamiyo-agent
        run: pnpm install --ignore-workspace && pnpm build

      - name: Install docs-agent deps
        working-directory: services/kamiyo-docs-agent
        run: pnpm install --ignore-workspace

      - name: Build docs-agent
        working-directory: services/kamiyo-docs-agent
        run: pnpm build

      - name: Run docs-agent
        if: steps.skip.outputs.skip == 'false'
        working-directory: services/kamiyo-docs-agent
        run: node dist/index.js

      - name: Open PR with regenerated docs
        if: steps.skip.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.AUTOPILOT_PAT || github.token }}
        run: |
          if git diff --quiet -- README.md CHANGELOG.md services/*/CHANGELOG.md services/*/README.md; then
            echo "no doc changes"
            exit 0
          fi
          short="${MERGE_SHA:0:7}"
          branch="docs-agent/regen-${short}"
          git checkout -b "$branch"
          git add README.md CHANGELOG.md services/*/CHANGELOG.md services/*/README.md 2>/dev/null || true
          git commit -m "docs-agent: regenerate for ${short}"
          git push -u origin "$branch"
          pr_url=$(gh pr create \
            --base main \
            --head "$branch" \
            --title "docs-agent: regenerate for ${short}" \
            --body "Automated docs refresh for commit ${short}. Review diff, squash-merge." \
            --label agent-approved 2>/dev/null || true)
          if [[ -z "$pr_url" ]]; then
            pr_url=$(gh pr view "$branch" --json url --jq .url 2>/dev/null || true)
          fi
          pr_number=""
          if [[ -n "$pr_url" ]]; then
            pr_number=$(gh pr view "$branch" --json number --jq .number 2>/dev/null || true)
          fi
          node services/kamiyo-docs-agent/dist/update-ledger.js "$MERGE_SHA" "$branch" "$pr_url" "$pr_number"

      - name: Reconcile docs-agent receipts
        env:
          GITHUB_TOKEN: ${{ secrets.AUTOPILOT_PAT || github.token }}
        working-directory: services/kamiyo-docs-agent
        run: node dist/reconcile.js
