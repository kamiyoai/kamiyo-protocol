name: Kani

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  KANI_VERSION: 0.67.0

concurrency:
  group: kani-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kani:
    name: Kani
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Kani
        uses: model-checking/kani-github-action@v1
        with:
          kani-version: ${{ env.KANI_VERSION }}
          args: --version

      - name: Verify Kani Proofs
        run: |
          KANI_OUT_DIR=kani-results ./scripts/kani-ci.sh
          KANI_AUDIT_PER_PACKAGE=1 ./scripts/kani-audit.sh kani-results/kani.log

      - name: Upload Kani Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kani-results
          path: kani-results
          if-no-files-found: error
          retention-days: 30
