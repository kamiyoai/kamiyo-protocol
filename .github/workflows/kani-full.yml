name: Kani (Full)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: kani-full
  cancel-in-progress: false

jobs:
  kani_full:
    name: Kani (Full)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Kani
        uses: model-checking/kani-github-action@v1
        with:
          args: --version

      - name: Verify Kani Proofs (Full)
        run: |
          KANI_FULL=1 KANI_OUT_DIR=kani-results ./scripts/kani-ci.sh
          KANI_EXPECT_COVERS=1 ./scripts/kani-audit.sh kani-results/kani.log

      - name: Publish Proof Receipt (Kiroku)
        if: always()
        continue-on-error: true
        env:
          KANI_FULL: "1"
          KANI_OUT_DIR: kani-results
          KIROKU_AGENT_PUBLISH_URL: ${{ secrets.KIROKU_AGENT_PUBLISH_URL }}
          KIROKU_AGENT_PUBLISH_KEY: ${{ secrets.KIROKU_AGENT_PUBLISH_KEY }}
          KIROKU_AGENT_AUTHOR: ${{ secrets.KIROKU_AGENT_AUTHOR }}
          KIROKU_RECEIPT_ORIGIN: ${{ secrets.KIROKU_RECEIPT_ORIGIN }}
        run: ./scripts/kani-publish-kiroku-receipt.sh

      - name: Upload Kani Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kani-full-results
          path: kani-results
          if-no-files-found: error
          retention-days: 30
