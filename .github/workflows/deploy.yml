name: Kizuna Deploy Gate

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Kizuna component to validate before promotion'
        required: true
        default: 'core'
        type: choice
        options:
          - core
          - facilitator
          - companion
          - wallet-control-plane
          - cdp-onboarding

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9

jobs:
  validate:
    name: Validate ${{ inputs.component }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Run selected release gate
        run: |
          case "${{ inputs.component }}" in
            core)
              pnpm run build
              pnpm run test
              ;;
            facilitator)
              pnpm --filter @kamiyo/x402-facilitator run build
              pnpm --filter @kamiyo/x402-facilitator run test
              ;;
            companion)
              pnpm --filter kamiyo-companion run build
              pnpm --filter kamiyo-companion run test
              ;;
            wallet-control-plane)
              pnpm --filter @kamiyo/wallet-control-plane run build
              ;;
            cdp-onboarding)
              pnpm --filter @kamiyo/cdp-onboarding run build
              ;;
            *)
              echo "Unsupported component: ${{ inputs.component }}"
              exit 1
              ;;
          esac

      - name: Promotion summary
        run: |
          echo "Kizuna release gate passed for ${{ inputs.component }}." >> "$GITHUB_STEP_SUMMARY"
          echo "Promotion happens through the normal production branch and platform deploy path after this gate passes." >> "$GITHUB_STEP_SUMMARY"

  kizuna_db_integration:
    name: Kizuna DB Integration
    if: ${{ inputs.component == 'core' || inputs.component == 'facilitator' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kizuna_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kizuna_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Run Kizuna DB integration invariants
        env:
          KIZUNA_INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kizuna_ci
        run: pnpm --filter @kamiyo/x402-facilitator test -- tests/kizuna-db.integration.test.ts
