name: Deploy

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy to'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - mainnet
      component:
        description: 'Component to deploy'
        required: true
        default: 'hyperliquid'
        type: choice
        options:
          - hyperliquid
          - all

env:
  FOUNDRY_PROFILE: ci

jobs:
  deploy-hyperliquid:
    name: Deploy Hyperliquid Contracts
    if: inputs.component == 'hyperliquid' || inputs.component == 'all'
    runs-on: ubuntu-latest
    environment: ${{ inputs.network }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build Contracts
        working-directory: contracts/hyperliquid
        run: forge build

      - name: Run Tests
        working-directory: contracts/hyperliquid
        run: forge test -vvv

      - name: Verify Verification Key
        working-directory: contracts/hyperliquid
        run: |
          echo "Verifying VK matches circuit artifacts..."
          # Compare VK hash from circuit build with deployed script

      - name: Deploy to ${{ inputs.network }}
        working-directory: contracts/hyperliquid
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ inputs.network == 'mainnet' && secrets.HYPERLIQUID_MAINNET_RPC || secrets.HYPERLIQUID_TESTNET_RPC }}
        run: |
          forge script script/Deploy.s.sol:Deploy \
            --rpc-url $RPC_URL \
            --broadcast \
            --verify \
            -vvvv

      - name: Output Deployed Addresses
        run: |
          echo "### Deployed Addresses" >> $GITHUB_STEP_SUMMARY
          echo "Network: ${{ inputs.network }}" >> $GITHUB_STEP_SUMMARY
          cat contracts/hyperliquid/broadcast/Deploy.s.sol/*/run-latest.json | jq '.transactions[] | select(.transactionType == "CREATE") | {contract: .contractName, address: .contractAddress}' >> $GITHUB_STEP_SUMMARY

      - name: Upload Broadcast Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperliquid-broadcast-${{ inputs.network }}
          path: contracts/hyperliquid/broadcast/Deploy.s.sol/**/run-latest.json
          if-no-files-found: error

  update-sdk-addresses:
    name: Update SDK Addresses
    needs: deploy-hyperliquid
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Broadcast Artifact
        uses: actions/download-artifact@v8
        with:
          name: hyperliquid-broadcast-${{ inputs.network }}
          path: deployment-broadcast

      - name: Parse Deployed Addresses
        run: |
          BROADCAST_JSON="$(find deployment-broadcast -type f -name run-latest.json | head -n 1)"
          if [ -z "$BROADCAST_JSON" ]; then
            echo "::error::run-latest.json not found in downloaded artifact"
            exit 1
          fi
          node scripts/update-hyperliquid-addresses.mjs \
            --network "${{ inputs.network }}" \
            --broadcast "$BROADCAST_JSON"

      - name: Create PR with Address Updates
        uses: peter-evans/create-pull-request@v8
        with:
          title: "chore: update ${{ inputs.network }} contract addresses"
          body: |
            Automated update of contract addresses after deployment.

            Network: ${{ inputs.network }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch: auto/update-${{ inputs.network }}-addresses-${{ github.run_id }}
          commit-message: "chore: update ${{ inputs.network }} contract addresses"
          add-paths: |
            packages/kamiyo-hyperliquid/src/types.ts
