name: Weekly Secret Env Parity Audit

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: Secret and Env Parity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KAMIYO_CANARY_ALERT_WEBHOOK: ${{ secrets.KAMIYO_CANARY_ALERT_WEBHOOK }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run parity audit
        env:
          GH_TOKEN: ${{ secrets.KAMIYO_CANARY_GH_ADMIN_TOKEN }}
          KAMIYO_RENDER_API_KEY: ${{ secrets.KAMIYO_RENDER_API_KEY }}
          PARITY_REPORT_PATH: reports/secret-env-parity.json
        run: node scripts/weekly-secret-env-parity.mjs

      - name: Upload parity report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: weekly-secret-env-parity
          path: reports/secret-env-parity.json

      - name: Notify parity failure
        if: ${{ failure() && env.KAMIYO_CANARY_ALERT_WEBHOOK != '' }}
        run: |
          payload="$(jq -nc \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_number "$GITHUB_RUN_NUMBER" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg sha "$GITHUB_SHA" \
            --arg actor "$GITHUB_ACTOR" \
            --arg url "https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{text: ("Weekly secret/env parity failed (" + $workflow + " #" + $run_number + ") on " + $repo + " at " + $sha + ". Triggered by " + $actor + ". " + $url)}')"
          curl -fsSL -X POST \
            -H 'Content-Type: application/json' \
            -d "$payload" \
            "$KAMIYO_CANARY_ALERT_WEBHOOK"
