name: Nightly Enterprise Canary

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  canary:
    name: Enterprise Live Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SOLANA_RPC_URL: ${{ secrets.KAMIYO_CANARY_SOLANA_RPC_URL }}
      JWT_SECRET: ${{ secrets.KAMIYO_CANARY_JWT_SECRET }}
      API_SECRET: ${{ secrets.KAMIYO_CANARY_API_SECRET }}
      API_PORT: '3001'
      ANTHROPIC_API_KEY: ${{ secrets.KAMIYO_CANARY_ANTHROPIC_API_KEY }}
      KAMIYO_OPERATOR_PRIVATE_KEY: ${{ secrets.KAMIYO_CANARY_OPERATOR_PRIVATE_KEY }}
      AGENT_PRIVATE_KEY: ${{ secrets.KAMIYO_CANARY_AGENT_PRIVATE_KEY }}
      KAMIYO_PROGRAM_ID: '3ZYPtFBF8rfRYvLi5QUnU4teHPzFEpHuz6dUZry9FRKr'
      CDP_API_KEY_ID: ${{ secrets.KAMIYO_CANARY_CDP_API_KEY_ID }}
      CDP_API_KEY_SECRET: ${{ secrets.KAMIYO_CANARY_CDP_API_KEY_SECRET }}
      CDP_WALLET_SECRET: ${{ secrets.KAMIYO_CANARY_CDP_WALLET_SECRET }}
      PARANET_DKG_ENDPOINT: ${{ secrets.KAMIYO_CANARY_PARANET_DKG_ENDPOINT }}
      PARANET_BLOCKCHAIN: 'base:8453'
      PARANET_DKG_PORT: '8900'
      PARANET_PRIVATE_KEY: ${{ secrets.KAMIYO_CANARY_PARANET_PRIVATE_KEY }}
      PARANET_UAL: ${{ secrets.KAMIYO_CANARY_PARANET_UAL }}
      PARANET_OPERATOR_GLOBAL_ID: ${{ secrets.KAMIYO_CANARY_PARANET_OPERATOR_GLOBAL_ID }}
      PARANET_ATTESTOR_GLOBAL_ID: ${{ secrets.KAMIYO_CANARY_PARANET_ATTESTOR_GLOBAL_ID }}
      KAMIYO_CANARY_ALERT_WEBHOOK: ${{ secrets.KAMIYO_CANARY_ALERT_WEBHOOK }}
      KAMIYO_SDK_SMOKE_MIN_PAYER_SOL: '0.05'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Materialize SDK signer keypair
        if: ${{ env.AGENT_PRIVATE_KEY != '' }}
        run: |
          keyfile="$(mktemp -t kamiyo-canary-agent-XXXXXX.json)"
          printf '%s' "$AGENT_PRIVATE_KEY" > "$keyfile"
          chmod 600 "$keyfile"
          echo "AGENT_KEYPAIR_PATH=$keyfile" >> "$GITHUB_ENV"

      - name: Enterprise preflight
        run: pnpm run preflight:enterprise

      - name: Enterprise live smoke
        run: pnpm run smoke:enterprise

      - name: Notify canary failure
        if: ${{ failure() && env.KAMIYO_CANARY_ALERT_WEBHOOK != '' }}
        run: |
          payload="$(jq -nc \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_number "$GITHUB_RUN_NUMBER" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg sha "$GITHUB_SHA" \
            --arg actor "$GITHUB_ACTOR" \
            --arg url "https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{text: ("Nightly enterprise canary failed (" + $workflow + " #" + $run_number + ") on " + $repo + " at " + $sha + ". Triggered by " + $actor + ". " + $url)}')"
          curl -fsSL -X POST \
            -H 'Content-Type: application/json' \
            -d "$payload" \
            "$KAMIYO_CANARY_ALERT_WEBHOOK"
