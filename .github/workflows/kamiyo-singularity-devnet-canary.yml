name: Kamiyo Singularity Devnet Canary

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  devnet-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Singularity devnet canary
        env:
          SINGULARITY_CANARY_RPC_URL: ${{ secrets.SINGULARITY_CANARY_RPC_URL }}
          SINGULARITY_CANARY_WALLET: ${{ secrets.SINGULARITY_CANARY_WALLET }}
          SINGULARITY_CANARY_MIN_SOL: ${{ secrets.SINGULARITY_CANARY_MIN_SOL }}
          SINGULARITY_CANARY_STAKING_POOL_ADDRESS: ${{ secrets.SINGULARITY_CANARY_STAKING_POOL_ADDRESS }}
          SINGULARITY_CANARY_REQUIRE_STAKING_POOL: ${{ secrets.SINGULARITY_CANARY_REQUIRE_STAKING_POOL }}
        run: node ops/kamiyo-singularity/devnet-canary.mjs
