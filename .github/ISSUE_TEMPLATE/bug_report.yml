name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the protocol is affected?
      options:
        - Solana Programs
        - TypeScript SDK
        - API Server
        - EVM Contracts
        - Mobile App (Keiro)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Package version or commit hash
      placeholder: e.g., 1.0.0 or abc1234

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant error logs or stack traces
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem
