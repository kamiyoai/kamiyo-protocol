# KAMIYO Agent Paranet - Kubernetes Deployment Example
# This is a reference configuration - adjust for your environment

apiVersion: v1
kind: ConfigMap
metadata:
  name: paranet-config
  labels:
    app: kamiyo-paranet
data:
  DKG_ENDPOINT: "https://your-dkg-node.example.com"
  DKG_PORT: "8900"
  DKG_BLOCKCHAIN: "base:8453"
  DKG_EPOCHS: "12"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CACHE_TTL_MS: "300000"
  CACHE_MAX_SIZE: "1000"
  CIRCUIT_BREAKER_THRESHOLD: "5"
  CIRCUIT_BREAKER_RESET_MS: "30000"

---
apiVersion: v1
kind: Secret
metadata:
  name: paranet-secrets
  labels:
    app: kamiyo-paranet
type: Opaque
stringData:
  DKG_PRIVATE_KEY: ""  # Set via kubectl or external secrets manager
  REDIS_PASSWORD: ""   # Optional: for Redis caching

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kamiyo-paranet
  labels:
    app: kamiyo-paranet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kamiyo-paranet
  template:
    metadata:
      labels:
        app: kamiyo-paranet
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: paranet
          image: kamiyo/agent-paranet:latest
          ports:
            - name: http
              containerPort: 3000
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: paranet-config
            - secretRef:
                name: paranet-secrets
          env:
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

---
apiVersion: v1
kind: Service
metadata:
  name: kamiyo-paranet
  labels:
    app: kamiyo-paranet
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
  selector:
    app: kamiyo-paranet

---
# Optional: Redis for distributed caching
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args:
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paranet-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kamiyo-paranet-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kamiyo-paranet
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# Pod Disruption Budget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kamiyo-paranet-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: kamiyo-paranet

---
# ServiceMonitor for Prometheus Operator (optional)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kamiyo-paranet
  labels:
    app: kamiyo-paranet
spec:
  selector:
    matchLabels:
      app: kamiyo-paranet
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
