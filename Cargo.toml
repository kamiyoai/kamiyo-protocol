[workspace]
members = [
    "programs/kamiyo",
    "programs/kamiyo-escrow",
    "programs/kamiyo-staking",
    "programs/kamiyo-governance",
    "programs/kamiyo-transfer-hook",
    "programs/swarmteams",
    "programs/kamiyo-fast-voting",
    "programs/meishi",
]
resolver = "2"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
opt-level = "z"

[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1

# Pin versions to be compatible with the Solana BPF toolchain
[patch.crates-io]
# blake3 1.8.x uses edition2024 which BPF toolchain doesn't support
# Pin to 1.5.5 which uses edition2021 and constant_time_eq 0.3.x
blake3 = { git = "https://github.com/BLAKE3-team/BLAKE3", tag = "1.5.5" }
